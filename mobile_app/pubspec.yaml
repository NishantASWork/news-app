name: news_app
description: Mini News App - mobile reader.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  google_sign_in: ^6.2.2
  provider: ^6.1.2
  go_router: ^14.6.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  share_plus: ^10.0.2
  shared_preferences: ^2.3.3
  infinite_scroll_pagination: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
