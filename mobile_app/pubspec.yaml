name: news_app
description: Mini News App - mobile reader.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^15.2.0
  google_sign_in: ^6.2.2
  provider: ^6.1.2
  go_router: ^14.6.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  share_plus: ^10.0.2
  shared_preferences: ^2.3.3
  infinite_scroll_pagination: ^4.0.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
