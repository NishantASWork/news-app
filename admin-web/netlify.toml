# Next.js app – requires Essential Next.js plugin so routes and API work (no 404 at root).
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build]
  command = "npm run build"
  # Do not set publish – the plugin deploys the Next.js output.

# Allow NEXT_PUBLIC_* and ImgBB key in build output (they are inlined by Next.js by design).
# Netlify secrets scanning would otherwise fail the build.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_IMGBB_API_KEY"
